<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" type="text/css" href="style.css">
</head>


<body scroll="no" class="noselect"
    style="background-color:white; position:relative; overflow:auto; text-align: center;">


    <img id="CameraImage" src="" style="width:345px;height:250px">

    <!--
    <p style="text-align: center;">
    X: <span id="x_coordinate"> </span>
    Y: <span id="y_coordinate"> </span>
    Speed: <span id="speed"> </span> %
    Angle: <span id="angle"> </span>
  </p>  
  -->

    <br>

    <canvas id="Canvas" name="game" style="background-color:rgb(4 3 20 / 40%);"></canvas>

    <table id="MainTable" style="width:345px; margin:auto; table-layout:fixed" cellspacing=10>

        <tr>
            <td style="text-align:left"><b>RSSI: </b><b id="Rssi"></b></td>
            <td colspan=1 style="text-align:left"><b>Speed:</b></td>
            <td>
                <div class="slidecontainer">
                    <input type="range" min="1" max="5" value="5" class="slider" id="Speed">
                </div>
            </td>
        </tr>


        <tr>
            <td style="text-align:left"><b>Pan:</b></td>

            <td class="button" id="btnPanLeft" onmousedown='PanLeft();' onmouseup=stopIncrement();
                ontouchstart='PanLeft();' ontouchend='stopIncrement();'><span class="arrows">&#9664;</span>
            </td>
            <td class="button" id="btnPanRight" onmousedown='PanRight();' onmouseup=stopDecrement();
                ontouchstart='PanRight();' ontouchend='stopDecrement();'><span class="arrows">&#9654;</span>
            </td>

        </tr>
        <tr>
            <td style="text-align:left"><b>Tilt:</b></td>

            <td class="button" id="btnTiltUp" onmousedown='TiltUp();' onmouseup=stopIncrement();
                ontouchstart='TiltUp();' ontouchend='stopIncrement();'><span class="arrows">&#9650;</span>
            </td>
            <td class="button" id="btnTiltDown" onmousedown='TiltDown();' onmouseup=stopDecrement();
                ontouchstart='TiltDown();' ontouchend='stopDecrement();'><span class="arrows">&#9660;</span>
            </td>
        </tr>
        <tr>
            <td class="button" id="btnLight" onmousedown='LightOnOff();' ontouchstart='LightOnOff();'><span
                    class="arrows">&#128262;</span></td>
            <td class="button" id="btnCenterServos" onmousedown='CenterServos();' ontouchstart='CenterServos();'><span
                    class="arrows">&#9678;</span></td>
            <td class="button" id="btnMelody" onmousedown='MelodyOnOff();' ontouchstart='MelodyOnOff();'><span
                    class="arrows">&#127925;</span></td>
        </tr>
        <tr>
            <td></td>
            <td class="button" id="btnObstacleAvoidance" onmousedown='ObstacleAvoidanceOnOff();' ontouchstart='
        ObstacleAvoidanceOnOff();'><span class="arrows">&#128225;</span></td>
            <td></td>
        </tr>

    </table>

    <script>
        ///////////////////////// VARIABLES //////////////////////////////
        let cameraWatchdog;
        let width, height, radius, x_orig, y_orig;
        let coord = { x: 0, y: 0 };
        let paint = false;

        let webSocketCameraUrl = "ws://" + window.location.hostname + "/Camera";
        let webSocketCarInputUrl = "ws://" + window.location.hostname + "/CarInput";
        let websocketCamera;
        let websocketCarInput;

        // Temporizadores separados para evitar fugas de memoria y bucles infinitos
        let panTimer = null;
        let tiltTimer = null;

        let isMelodyOn = false;
        let isLightOn = false;
        let isObstacleAvoidanceOn = false;
        let currentDirection = 0;
        let servoSpeed = 50;
        let panServoCounter = 75;
        let tiltServoCounter = 90;

        let lastCameraUrl = null;
        let lastSendTime = 0;

        const btnObstacleAvoidance = document.getElementById("btnObstacleAvoidance");
        const btnLight = document.getElementById("btnLight");
        const btnMelody = document.getElementById("btnMelody");
        const btnCenterServos = document.getElementById("btnCenterServos");
        const canvas = document.getElementById("Canvas");
        const ctx = canvas.getContext("2d");
        const rssi = document.getElementById("Rssi");
        const mainTable = document.getElementById("MainTable");
        const cameraImage = document.getElementById("CameraImage");

        const btnPanLeft = document.getElementById("btnPanLeft");
        const btnPanRight = document.getElementById("btnPanRight");
        const btnTiltUp = document.getElementById("btnTiltUp");
        const btnTiltDown = document.getElementById("btnTiltDown");

        const FORWARD = 1, BACKWARD = 2, LEFT = 3, RIGHT = 4, STOP = 0;
        const FORWARDLEFT = 5, FORWARDRIGHT = 6, BACKLEFT = 7, BACKRIGHT = 8;

        ////////////////////////////////// WEBSOCKET CAMERA ////////////////////////////////

        function resetCameraWatchdog() {
            clearTimeout(cameraWatchdog);
            cameraWatchdog = setTimeout(function () {
                console.warn("Video congelado. Forzando reconexión...");
                if (websocketCamera) {
                    websocketCamera.close();
                }
            }, 3000);
        }

        function initCameraWebSocket() {
            websocketCamera = new WebSocket(webSocketCameraUrl);
            websocketCamera.binaryType = 'blob';

            websocketCamera.onopen = function () {
                console.log('Camera WebSocket connected');
                resetCameraWatchdog();
            };

            websocketCamera.onclose = function () {
                clearTimeout(cameraWatchdog);
                setTimeout(initCameraWebSocket, 2000);
            };

            websocketCamera.onmessage = function (event) {
                resetCameraWatchdog();

                // Gestión correcta de blobs en memoria para evitar congelación del motor gráfico
                const newUrl = URL.createObjectURL(event.data);

                cameraImage.onload = function () {
                    if (lastCameraUrl) {
                        URL.revokeObjectURL(lastCameraUrl);
                    }
                    lastCameraUrl = newUrl;
                };

                cameraImage.src = newUrl;
            };
        }

        ////////////////////////////////// WEBSOCKET CAR INPUT ////////////////////////////////

        function initCarInputWebSocket() {
            websocketCarInput = new WebSocket(webSocketCarInputUrl);

            websocketCarInput.onopen = function () {
                console.log('CarInput WebSocket connected');
                sendCommand('P', panServoCounter);
                sendCommand('T', tiltServoCounter);
                sendCommand('S', document.getElementById("Speed").value);
            };

            websocketCarInput.onclose = function () {
                setTimeout(initCarInputWebSocket, 2000);
            };

            websocketCarInput.onmessage = function (event) {
                try {
                    const telemetry = JSON.parse(event.data);
                    if (telemetry.rssi !== undefined) rssi.innerText = telemetry.rssi;
                    if (telemetry.obstacle !== undefined) {
                        canvas.style.border = telemetry.obstacle ? "3px solid red" : "none";
                    }
                } catch (e) { }
            };
        }

        function sendCommand(command, value) {
            if (websocketCarInput && websocketCarInput.readyState === WebSocket.OPEN) {
                // Evita saturar el búfer del WebSocket si la red se ralentiza
                if (websocketCarInput.bufferedAmount < 1024) {
                    const data = new Uint8Array([command.charCodeAt(0), parseInt(value)]);
                    websocketCarInput.send(data);
                }
            }
        }

        ////////////////// CONTROL DE SERVOS CORREGIDO //////////////////

        function CenterServos() {
            panServoCounter = 75;
            tiltServoCounter = 90;
            sendCommand('C', 1);
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function ObstacleAvoidanceOnOff() {
            isObstacleAvoidanceOn = !isObstacleAvoidanceOn;
            btnObstacleAvoidance.style.backgroundColor = isObstacleAvoidanceOn ? "rgb(236 240 243)" : 'black';
            sendCommand('O', 1);
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function LightOnOff() {
            isLightOn = !isLightOn;
            btnLight.style.backgroundColor = isLightOn ? "rgb(236 240 243)" : 'black';
            sendCommand('L', 1);
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function MelodyOnOff() {
            isMelodyOn = !isMelodyOn;
            btnMelody.style.backgroundColor = isMelodyOn ? "rgb(236 240 243)" : 'black';
            sendCommand('H', 1);
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function PanLeft() {
            stopPan();
            btnPanLeft.style.backgroundColor = "rgb(236 240 243)";
            if (panServoCounter < 180) {
                panServoCounter++;
                sendCommand("P", panServoCounter);
                panTimer = setTimeout(PanLeft, servoSpeed);
            }
        }

        function PanRight() {
            stopPan();
            btnPanRight.style.backgroundColor = "rgb(236 240 243)";
            if (panServoCounter > 0) {
                panServoCounter--;
                sendCommand("P", panServoCounter);
                panTimer = setTimeout(PanRight, servoSpeed);
            }
        }

        function TiltUp() {
            stopTilt();
            btnTiltUp.style.backgroundColor = "rgb(236 240 243)";
            if (tiltServoCounter > 0) {
                tiltServoCounter--;
                sendCommand("T", tiltServoCounter);
                tiltTimer = setTimeout(TiltUp, servoSpeed);
            }
        }

        function TiltDown() {
            stopTilt();
            btnTiltDown.style.backgroundColor = "rgb(236 240 243)";
            if (tiltServoCounter < 180) {
                tiltServoCounter++;
                sendCommand("T", tiltServoCounter);
                tiltTimer = setTimeout(TiltDown, servoSpeed);
            }
        }

        function stopPan() {
            if (panTimer) clearTimeout(panTimer);
            panTimer = null;
            btnPanLeft.style.backgroundColor = 'black';
            btnPanRight.style.backgroundColor = 'black';
        }

        function stopTilt() {
            if (tiltTimer) clearTimeout(tiltTimer);
            tiltTimer = null;
            btnTiltUp.style.backgroundColor = 'black';
            btnTiltDown.style.backgroundColor = 'black';
        }

        function stopIncrement() {
            stopPan();
            stopTilt();
        }

        function stopDecrement() {
            stopPan();
            stopTilt();
        }

        document.getElementById("Speed").onchange = function () {
            sendCommand('S', this.value);
        };

        //////////////////// JOYSTICK ////////////////////////////

        function background() {
            x_orig = width / 2;
            y_orig = height / 2;
            ctx.beginPath();
            ctx.arc(x_orig, y_orig, radius + 20, 0, Math.PI * 2, true);
            ctx.fillStyle = '#ECE5E5';
            ctx.fill();
        }

        function joystick(w, h) {
            ctx.beginPath();
            ctx.arc(w, h, radius, 0, Math.PI * 2, true);
            ctx.fillStyle = '#e31414';
            ctx.fill();
            ctx.strokeStyle = '#F6ABAB';
            ctx.lineWidth = 8;
            ctx.stroke();
        }

        function resize() {
            width = 345;
            radius = 30;
            height = radius * 4.5;
            ctx.canvas.width = width;
            ctx.canvas.height = height;
            background();
            joystick(width / 2, height / 2);
        }

        function getPosition(event) {
            const rect = canvas.getBoundingClientRect();
            const mouse_x = event.clientX || (event.touches && event.touches[0].clientX);
            const mouse_y = event.clientY || (event.touches && event.touches[0].clientY);
            coord.x = mouse_x - rect.left;
            coord.y = mouse_y - rect.top;
        }

        function Draw(event) {
            if (event.cancelable) event.preventDefault();
            if (!paint) return;

            const rect = canvas.getBoundingClientRect();
            const mouseX = event.clientX || (event.touches && event.touches[0].clientX);
            const mouseY = event.clientY || (event.touches && event.touches[0].clientY);

            let dx = mouseX - rect.left - x_orig;
            let dy = mouseY - rect.top - y_orig;
            let invertedY = -dy;
            let distance = Math.sqrt(dx * dx + dy * dy);

            let angle = Math.atan2(invertedY, dx) * 180 / Math.PI;
            if (angle < 0) angle += 360;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            background();

            let x, y;
            if (distance <= radius) {
                x = mouseX - rect.left;
                y = mouseY - rect.top;
            } else {
                let rad = angle * Math.PI / 180;
                x = x_orig + radius * Math.cos(rad);
                y = y_orig - radius * Math.sin(rad);
            }
            joystick(x, y);

            let speed = Math.round(100 * Math.min(distance, radius) / radius);
            processAndSend(speed, angle, false);
        }

        function processAndSend(speed, angle, force = false) {
            let newDirection = STOP;

            if (speed < 15) {
                newDirection = STOP;
            } else {
                if (angle >= 67.5 && angle < 112.5) newDirection = FORWARD;
                else if (angle >= 112.5 && angle < 157.5) newDirection = FORWARDRIGHT;
                else if (angle >= 157.5 && angle < 202.5) newDirection = LEFT;
                else if (angle >= 202.5 && angle < 247.5) newDirection = BACKRIGHT;
                else if (angle >= 247.5 && angle < 292.5) newDirection = BACKWARD;
                else if (angle >= 292.5 && angle < 337.5) newDirection = BACKLEFT;
                else if (angle >= 337.5 || angle < 22.5) newDirection = RIGHT;
                else if (angle >= 22.5 && angle < 67.5) newDirection = FORWARDLEFT;
            }

            if (newDirection !== currentDirection || force) {
                let currentTime = Date.now();
                if (force || (currentTime - lastSendTime > 50)) {
                    currentDirection = newDirection;
                    sendCommand('M', currentDirection);
                    lastSendTime = currentTime;
                }
            }
        }

        function startDrawing(event) {
            if (event.cancelable) event.preventDefault();
            paint = true;
            getPosition(event);
            Draw(event);
        }

        function stopDrawing(event) {
            if (event && event.cancelable) event.preventDefault();
            paint = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            background();
            joystick(width / 2, height / 2);
            processAndSend(0, 0, true);
        }

        function initFunction() {
            resize();
            initCameraWebSocket();
            initCarInputWebSocket();

            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mousemove', Draw);

            canvas.addEventListener('touchstart', startDrawing);
            canvas.addEventListener('touchend', stopDrawing);
            canvas.addEventListener('touchcancel', stopDrawing);
            canvas.addEventListener('touchmove', Draw);
            window.addEventListener('resize', resize);

            window.addEventListener('mouseup', function (e) {
                stopIncrement();
                stopDecrement();
                stopDrawing(e);
            });
            window.addEventListener('touchend', function (e) {
                stopIncrement();
                stopDecrement();
                stopDrawing(e);
            });
        }

        window.onload = initFunction;
        mainTable.addEventListener("touchend", function (event) {
            event.preventDefault();
        });
    </script>
</body>

</html>
